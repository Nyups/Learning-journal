<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Memo</title>

    <!-- 01 - There is two way of using a script in HTML, First one being linking an external file in the <head> section like so : -->
    <script src="MySuperCoolScriptHere"></script>

    <!-- 03 - There is also multiple way to call the script, those being :

    - <script src="">  The classic way, doesn't wait and run as soon as the page is open
    - <script src="" defer>  Will wait for the HTML file to fully load before running
    - <script src="" async>  Mostly used for Analytics, Ads and Independent script
    -->
</head>
<body>
    <!-- 02 - Or Directly in the body like so : -->
     <script>
        
     </script>
</body>
</html>

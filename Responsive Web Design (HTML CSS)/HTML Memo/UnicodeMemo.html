<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode Memo</title>
</head>
<body>
    <!-- Unicode Memo (Important! kinda) : -->
    
&lt;    <!-- < -->
&gt;    <!-- > -->
&amp;   <!-- & -->
&quot;  <!-- " -->
&nbsp; <!-- non-breaking space -->

<!-- The three type of character reference :
- Reference (start with & and end with ;) for example : &lt;
- Decimal numeric reference (start with &# followed by one or more decimal digits and end with ;) for example : &#60;
- Hexadecimal numeric reference ( starts with &#x and end by ;) for example : &#x3C;
-->

</body>
</html>

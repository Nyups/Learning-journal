<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id and Class Memo</title>
</head>
<body>
    <!-- 
    ID : Used to target and define one unique things (as you can only have one ID name by HTML PAGE)-->

<div id="header"></div> 
<!-- Can later be used to navigate with href like so-->
<a href="#header">Header</a>
<!--Then if you click on the anchor it will take you to where the div with the id "header" is on the page-->

    <!-- 
Class : Used to target oen or more element that share something in common.
for example :

Student ID: 10482  // Unique Target (ID)
Groups: // Groups Target (.class)
- basketball
- science-club
- seniors
-->
     <div class="card"></div>  <!-- Div with a single class-->
     <div class="card dark featured"></div> <!-- Div with multiple class-->
</body>
</html>

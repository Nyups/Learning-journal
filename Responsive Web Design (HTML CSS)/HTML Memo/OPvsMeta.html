<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- SEO metadata (used by search engines like Google) Used mainly by search engines to describe the page. (I should keep this simple)-->
     <meta
  name="description"
  content="Discover unforgettable trips across Japan.">

  <!-- Meta for Open Graph :-->
<meta property="og:title" content="Nyucleaire Travel">
<meta property="og:description" content="Discover unforgettable trips across Japan.">
<meta property="og:image" content="https://mysite.com/preview.png">
<meta property="og:url" content="https://mysite.com">
<meta property="og:type" content="website">
<!-- Memo :

SEO Metadata
------------
Uses the `name` attribute.

Example:
<meta name="description" content="...">

Purpose:
Describe the page for search engines like Google ect


Open Graph Metadata
-------------------
Uses the `property` attribute.

Example:
<meta property="og:title" content="...">

Purpose:
Describe how the page should appear when shared on social media (Discord, Facebook, LinkedIn, etc.).


Difference
----------
Both use the `content` attribute.

The difference is:
- SEO uses `name`
- Open Graph uses `property`


/!\ : Twitter/X uses its own metadata (twitter:title, twitter:image, etc.), although many platforms can fall back to Open Graph.
-->
</head>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Example of superscript to illustrate exponents : -->
    <h2>Example of superscript to illustrate exponents :</h2>
    <p>2<sup>2</sup> (2 squared) is 4.</p>
<br>
    <!-- Example using the superscript element for superior lettering -->
    <h2>Example using the superscript element for superior lettering</h2>
    <p>
        Monseigneur is often written as <strong>M<sup>gr</sup></strong>.
    </p>
</body>
<style>
    * {
        color: white;
        background-color: black;
    }
</style>
</html>

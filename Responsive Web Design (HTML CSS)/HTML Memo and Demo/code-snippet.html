<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>example of code snippet in HTML</h1>
    <br>

    <h2>Example using only the "code" element</h2>
    <p>
    To set the text color to blue in CSS, use the following code:
    <code>color: blue;</code>
    </p>
    <br>

    <h2>Example using "pre" and "code"</h2>
    <pre>
    <code>
    body {
      color: red;
    }
    </code>
    </pre>
</body>
<style>
    * {
        color: white;
        background-color: black;
    }
</style>
</html>

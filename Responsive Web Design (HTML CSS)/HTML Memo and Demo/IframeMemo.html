<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Memo</title>
</head>
<body>
    <!-- Iframe Memo : 
     <iframe> is used to display a small windows containing an external webpage as an src.
     we generally cannot style or modify the page inside it unless
     we own both pages (same-origin policy). -->


    <!-- Bellow is an <iframe> example that display an interractive map. -->
        <h1>Iframe map example</h1>
    <iframe
         title="Map of the Royal Observatory, Greenwich, London" 
         width="300"
         height="200"
         src="https://www.openstreetmap.org/export/embed.html?bbox=-0.004017949104309083%2C51.47612752641776%2C0.00030577182769775396%2C51.478569861898606&amp;layer=mapnik">
    </iframe>
    <!-- <iframe> properties used here : 
       -title : Accessibility description. Screen readers use it to describe the iframe.
       -width : Litteraly the width   <-  ->
       -height : Litteraly the height ^ v
       -src : The URL of the page to display inside the iframe.
        -->


    <!-- Bellow is an <iframe> example of a Youtube video. -->
        <h1>Iframe video example</h1>
        <iframe  
            width="400"
            height="400"
            src="https://www.youtube.com/embed/PkZNo7MFNFg?si=-UBVIUNM3csdeiWF"
            title="Learn JavaScript - Full Course for Beginners (YouTube video)"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
        </iframe>
        <!-- <iframe> properties used here : 
       -title : The Title, not directly displayed but make it easier to find the ifram through inspection
       -width : Litteraly the width   <-  ->
       -height : Litteraly the height ^ v
       -src : The source of the page.
       -allow : Gives the embedded page permission to use browser features like autoplay, picture-in-picture, clipboard, gyroscope, etc.
       -referrerpolicy :
            Controls how much information about the current page is sent
            to the embedded website.

            strict-origin-when-cross-origin:
            - Same site -> send full URL.
            - Different site -> send only the domain.
            - HTTPS -> HTTP -> send nothing.
        -->


        <h1>Realistic iframe pattern</h1>
        <h2>OpenStreetMap example</h2>
<iframe
  width="425"
  height="350"
  src="https://www.openstreetmap.org/export/embed.html?bbox=3.006134033203125%2C6.150112578753815%2C3.6357879638671875%2C6.749850810550778&amp;layer=mapnik"
  title="Map of Lagos area, Nigeria"
  style="border: 1px solid black"
>
</iframe>
<br />
<small>
  <a href="https://www.openstreetmap.org/#map=11/6.4501/3.3210">
    View Larger Map
  </a>
</small>

        <!-- Additional Memo :
         <small> :
            Represents secondary or fine-print information.
            Usually displayed with a smaller font.

            Common uses:
            - Copyright notices
            - Attribution
            - Notes
            - Helper links


         Common iframe uses:

            - YouTube videos
            - Google Maps / OpenStreetMap
            - PDFs
            - Online forms
            - Chat widgets
            - Payment widgets
         -->
</body>
</html>
